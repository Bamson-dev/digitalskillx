# Coolify / Nixpacks — Next.js builds are memory-heavy; raise heap for Docker on Mac.
[variables]
NODE_OPTIONS = "--max-old-space-size=4096"
NIXPACKS_NODE_VERSION = "22"
# Do NOT set NODE_ENV here. Coolify often injects NODE_ENV=production at build time,
# which makes npm skip devDependencies (tailwind, postcss, typescript) and breaks `next build`.

[phases.install]
# Force devDependencies even when Coolify sets NODE_ENV=production at build time.
cmds = ["NODE_ENV=development npm ci"]

[phases.build]
cmds = ["npm run build"]
