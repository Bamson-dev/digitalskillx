# Coolify / Nixpacks — Next.js builds need devDependencies and enough heap.
# In Coolify: set NODE_ENV to **Runtime only** (not build time).

[variables]
NIXPACKS_NODE_VERSION = "22"
NEXT_TELEMETRY_DISABLED = "1"
# 2048 fits 2–4 GB Docker hosts; raise to 4096 only if the server has 8 GB+ RAM.
NODE_OPTIONS = "--max-old-space-size=2048"

[phases.install]
# Coolify often injects NODE_ENV=production at build time — force devDependencies.
cmds = ["npm ci --include=dev"]

[phases.build]
cmds = ["npm run build"]
